<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Payment Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f7fb}
.card-stat{border:none;border-radius:16px}
.table-responsive{max-height:500px}
</style>
</head>
<body>
<div class="container-fluid p-4">
<h2 class="mb-4">Payment Management Dashboard</h2>

<div class="row g-3 mb-4">
<div class="col-md-3"><div class="card card-stat"><div class="card-body"><h6>Total Entries</h6><h3 id="totalEntries">0</h3></div></div></div>
<div class="col-md-3"><div class="card card-stat"><div class="card-body"><h6>Total Amount</h6><h3 id="totalAmountCard">₹0</h3></div></div></div>
<div class="col-md-3"><div class="card card-stat"><div class="card-body"><h6>Total Received</h6><h3 id="totalReceivedCard">₹0</h3></div></div></div>
<div class="col-md-3"><div class="card card-stat"><div class="card-body"><h6>Total Pending</h6><h3 id="totalPendingCard">₹0</h3></div></div></div>
</div>

<div class="card mb-4">
<div class="card-body">
<div class="row g-3">
<div class="col-md-2"><input type="date" id="date" class="form-control"></div>
<div class="col-md-2"><input type="text" id="applicant" class="form-control" placeholder="Applicant"></div>
<div class="col-md-2"><input type="text" id="bank" class="form-control" placeholder="Bank"></div>
<div class="col-md-2"><input type="number" id="total" class="form-control" placeholder="Total Amount"></div>
<div class="col-md-2"><input type="number" id="challan" class="form-control" placeholder="Challan"></div>
<div class="col-md-2"><input type="number" id="perchallan" class="form-control" placeholder="Per Challan"></div>
<div class="col-md-2"><input type="number" id="received" class="form-control" placeholder="Received" readonly></div>
<div class="col-md-2">
<select id="status" class="form-select">
<option>Pending</option>
<option>Received</option>
</select>
</div>
<div class="col-md-8 d-flex gap-2">
<button class="btn btn-success" onclick="saveRecord()">Save</button>
<button class="btn btn-primary" onclick="loadRecords()">Fetch</button>
<button class="btn btn-secondary" onclick="exportCSV()">Excel</button>
<button class="btn btn-danger" onclick="window.print()">PDF</button>
</div>
</div>
</div>
</div>

<div class="card">
<div class="card-body">
<div class="row mb-3">
<div class="col-md-4"><input id="search" class="form-control" placeholder="Search Applicant" onkeyup="renderTable()"></div>
<div class="col-md-3">
<select id="filterStatus" class="form-select" onchange="renderTable()">
<option value="">All Status</option>
<option>Pending</option>
<option>Received</option>
</select>
</div>
</div>

<div class="table-responsive">
<table class="table table-bordered table-striped">
<thead>
<tr>
<th>#</th><th>Date</th><th>Applicant</th><th>Bank</th><th>Total</th><th>Challan</th><th>Per Challan</th><th>Received</th><th>Status</th><th>Pending</th><th>Delete</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>
</div>
</div>

<script>
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbwLc2FGROSx-VAMp2kUE5dvvhZfEMJb3ToZ9O4Ifv6c1DztDgVuB-bOE0m_xzbDMhqYUg/exec";
let records=[];

function calc(){
received.value=(+total.value||0)-(+challan.value||0)-(+perchallan.value||0);
}
total.oninput=calc;
challan.oninput=calc;
perchallan.oninput=calc;

async function saveRecord(){
const rec={
date:date.value,
applicant:applicant.value,
bank:bank.value,
total:+total.value||0,
challan:+challan.value||0,
per:+perchallan.value||0,
received:+received.value||0,
status:status.value,
pending:status.value==="Pending"?(+received.value||0):0
};

localStorage.setItem("lastRecord",JSON.stringify(rec));

if(WEBAPP_URL.startsWith("http")){
await fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify(rec)});
}
alert("Saved");
loadRecords();
}

async function loadRecords(){
if(WEBAPP_URL.startsWith("http")){
try{
const r=await fetch(WEBAPP_URL);
records=await r.json();
}catch(e){}
}
renderTable();
}

function renderTable(){
const tb=document.getElementById("tbody");
tb.innerHTML="";
let q=document.getElementById("search").value.toLowerCase();
let st=document.getElementById("filterStatus").value;

let totalAmt=0,totalRec=0,totalPend=0,count=0;

records.filter(r=>{
let a=(r["Applicant Name"]||r.applicant||"").toLowerCase().includes(q);
let b=!st || (r["Status"]||r.status)==st;
return a&&b;
}).forEach((r,i)=>{
count++;
let total=+(r["Total Amount"]||r.total||0);
let recv=+(r["Received Amount"]||r.received||0);
let pend=+(r["Pending Amount"]||r.pending||0);
totalAmt+=total;
totalRec+=recv;
totalPend+=pend;

tb.innerHTML+=`<tr>
<td>${i+1}</td>
<td>${r["Date"]||r.date||""}</td>
<td>${r["Applicant Name"]||r.applicant||""}</td>
<td>${r["Bank Name"]||r.bank||""}</td>
<td>${total}</td>
<td>${r["Challan Amount"]||r.challan||0}</td>
<td>${r["Per Challan Amount"]||r.per||0}</td>
<td>${recv}</td>
<td>${r["Status"]||r.status||""}</td>
<td>${pend}</td>
<td><button class='btn btn-sm btn-danger'>X</button></td>
</tr>`;
});

totalEntries.innerText=count;
totalAmountCard.innerText="₹"+totalAmt;
totalReceivedCard.innerText="₹"+totalRec;
totalPendingCard.innerText="₹"+totalPend;
}

function exportCSV(){
let csv="Date,Applicant,Bank,Total,Received,Status\n";
records.forEach(r=>{
csv += `${r.date||""},${r.applicant||""},${r.bank||""},${r.total||0},${r.received||0},${r.status||""}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="payments.csv";
a.click();
}
</script>
</body>
</html>
